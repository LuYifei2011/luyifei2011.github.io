<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Speech Highlight Example - scratchblocks-plus</title>
  <meta name="description" content="Speech-based highlighting - scratchblocks-plus example" />

  <link rel="stylesheet" href="//fonts.googleapis.com/css?family=Noto+Sans:400,700" />
  <link rel="stylesheet" href="//fonts.googleapis.com/css?family=JetBrains+Mono" />
  <link rel="stylesheet" href="../../style.css" />

  <style>
    body {
      margin: 0;
      padding: 0;
    }

    audio {
      display: none;
    }

    .appbar {
      display: flex;
      align-items: center;
      gap: 1em;
      padding: 1em 2em;
      background: #4ca6fb;
      color: white;
    }

    .example-container {
      margin: 0;
      width: 100vw;
    }

    .example-section {
      margin: 2em 0;
      padding: 2em;
      background: #f9f9f9;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
    }

    @media (prefers-color-scheme: dark) {
      .example-section {
        background: #2a2a2a;
        border-color: #444;
      }
    }

    .blocks-wrapper {
      margin: 1.5em 0;
      padding: 1.5em;
      background: white;
      border-radius: 6px;
      border: 1px solid #e0e0e0;
      overflow-x: auto;
    }

    @media (prefers-color-scheme: dark) {
      .blocks-wrapper {
        background: #1e1e1e;
        border-color: #333;
      }
    }

    .controls {
      display: flex;
      gap: 1em;
      margin-bottom: 1.5em;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.75em 1.5em;
      font-size: 1em;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 0.5em;
    }

    .btn-primary {
      background: #4ca6fb;
      color: white;
    }

    .btn-primary:hover {
      background: #357ae8;
      box-shadow: 0 2px 8px rgba(76, 166, 251, 0.3);
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .btn-primary:disabled {
      background: #999;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .status {
      font-size: 0.9em;
      color: #666;
      padding: 0.75em;
      background: #f5f5f5;
      border-radius: 4px;
      min-height: 1.5em;
    }

    @media (prefers-color-scheme: dark) {
      .status {
        background: #2a2a2a;
        color: #999;
      }
    }

    .status.active {
      color: #d97706;
      background: #fef3c7;
    }

    @media (prefers-color-scheme: dark) {
      .status.active {
        background: rgba(217, 119, 6, 0.1);
      }
    }

    .status.speaking {
      color: #059669;
      background: #d1fae5;
    }

    @media (prefers-color-scheme: dark) {
      .status.speaking {
        background: rgba(5, 150, 105, 0.1);
      }
    }

    .icon {
      display: inline-block;
      font-size: 1.1em;
    }

    a.back-link {
      display: inline-block;
      margin-left: auto;
      margin-right: 0;
    }

    a.back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="example-container">
    <div class="appbar">
      <div>
        <div style="font-size:1.3em;font-weight:700;letter-spacing:0.5px;">Speech Highlight Example</div>
        <div style="font-size:0.98em;font-weight:400;opacity:0.92;margin-top:0.2em;">Highlight blocks while speaking</div>
      </div>
      <a href="../../examples/" class="back-link" style="color:#fff;">&#8592; Examples</a>
    </div>

    <div class="example-section">
      <audio id="audio-player"></audio>
      <div class="controls">
        <button class="btn btn-primary" id="speak-btn">
          <span class="icon">🎤</span> Start Speaking
        </button>
      </div>
      <div class="status" id="status">
        Ready. Click the button to start speaking.
      </div>
      <div class="blocks-wrapper">
        <pre id="script-blocks"></pre>
      </div>

      <p>Note: The first playback may be out of sync due to audio loading time.</p>
    </div>
  </div>

  <script src="../../lib/scratchblocks-plus.min.js"></script>
  <script>
    class SpeechHighlighter {
      constructor() {
        this.audio = null;
        this.isPlaying = false;
        this.scriptView = null;
        this.highlightTimers = [];
        this.setupElements();
        this.setupEventListeners();
        this.initializeScript();
      }

      setupElements() {
        this.speakBtn = document.getElementById("speak-btn");
        this.status = document.getElementById("status");
        this.audio = document.getElementById("audio-player");
        this.audio.src = "./audio.mp3";
      }

      setupEventListeners() {
        this.speakBtn.addEventListener("click", () => this.toggleSpeak());
      }

      initializeScript() {
        // 完整的 Scratch 脚本
        const scriptCode = `when green flag clicked
ask [What is your name?] and wait
say (answer) for (2) seconds
wait (1) seconds`;

        const container = document.getElementById("script-blocks");

        try {
          // 解析脚本
          const doc = scratchblocks.parse(scriptCode, {
            languages: ["en"]
          });

          // 创建视图
          this.scriptView = scratchblocks.newView(doc, {
            style: "scratch3",
            scale: 0.9
          });

          // 渲染为 SVG
          const svg = this.scriptView.render();
          container.innerHTML = "";
          container.appendChild(svg);
        } catch (error) {
          console.error("Failed to render script:", error);
          container.innerHTML = "<p>Error rendering script</p>";
        }
      }

      toggleSpeak() {
        if (this.isPlaying) {
          this.stop();
        } else {
          this.speak();
        }
      }

      speak() {
        if (this.audio.paused === false) {
          this.audio.pause();
          this.audio.currentTime = 0;
        }

          this.updateStatus("Loading audio...", "active");
        this.speakBtn.disabled = true;

        // 检查音频是否已加载
        const playAudio = () => {
          // 定时高亮对应的块（块路径索引）
          const highlightSequence = [
            { text: "when green flag clicked", path: "1.1", delay: 0 },
            { text: "ask what is your name and wait", path: "1.2", delay: 2000 },
            { text: "say", path: "1.3", delay: 4500 },
            { text: "answer", path: "1.3.1", delay: 5000 },
            { text: "for 2 seconds", path: "1.3", delay: 5500 },
            { text: "wait 1 seconds", path: "1.4", delay: 6500 }
          ];

          this.isPlaying = true;
          this.updateStatus("Speaking...", "speaking");
          this.speakBtn.textContent = "⏹️ Stop Speaking";
          this.speakBtn.disabled = false;

          // 定时高亮对应的块
          this.highlightTimers = highlightSequence.map(item => {
            return setTimeout(() => {
              if (this.scriptView) {
                scratchblocks.clearHighlight(this.scriptView);
                scratchblocks.highlightBlock(this.scriptView, item.path, {
                  blink: false,
                  colorShift: false
                });
              }
            }, item.delay);
          });

          this.audio.onended = () => this.onAudioEnd();
          this.audio.onerror = () => this.onAudioError();
          this.audio.play().catch(error => {
            console.error("Audio playback error:", error);
            this.onAudioError();
          });
        };

        // 如果音频已加载，直接播放
        if (this.audio.readyState >= 2) {
          playAudio();
        } else {
          // 否则等待加载完成
          const handleCanPlay = () => {
            this.audio.removeEventListener('canplay', handleCanPlay);
            playAudio();
          };
          this.audio.addEventListener('canplay', handleCanPlay);
        }
      }

      onAudioEnd() {
        this.isPlaying = false;
        this.updateStatus("Speaking complete!", "");
        this.speakBtn.textContent = "🎤 Start Speaking";
        this.speakBtn.disabled = false;
        if (this.scriptView) {
          scratchblocks.clearHighlight(this.scriptView);
        }
        this.highlightTimers.forEach(timer => clearTimeout(timer));
      }

      onAudioError() {
        console.error("Audio playback error");
        this.updateStatus("Speaking error: Unable to load audio file", "");
        this.isPlaying = false;
        this.speakBtn.textContent = "🎤 Start Speaking";
        this.speakBtn.disabled = false;
        this.highlightTimers.forEach(timer => clearTimeout(timer));
      }

      stop() {
        this.audio.pause();
        this.audio.currentTime = 0;
        this.isPlaying = false;
        this.updateStatus("Stopped", "");
        this.speakBtn.textContent = "🎤 Start Speaking";
        this.speakBtn.disabled = false;
        if (this.scriptView) {
          scratchblocks.clearHighlight(this.scriptView);
        }
        this.highlightTimers.forEach(timer => clearTimeout(timer));
      }

      updateStatus(message, className) {
        this.status.textContent = message;
        this.status.className = "status";
        if (className) {
          this.status.classList.add(className);
        }
      }
    }

    // 初始化
    window.addEventListener("DOMContentLoaded", function () {
      new SpeechHighlighter();
    });
  </script>
</body>

</html>
